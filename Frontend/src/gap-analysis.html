<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gap Analysis - SkillBridge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .analysis-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(12px);
            max-width: 900px;
            margin: 120px auto 40px auto;
            box-shadow: var(--shadow);
        }
        .gap-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .status-badge {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .status-complete { background: #10b981; color: white; }
        .status-gap { background: #ef4444; color: white; }
        .status-improvement { background: #f59e0b; color: white; }
        .level-text { font-size: 0.9em; opacity: 0.8; }
    </style>
</head>
<body>
    <header>
        <h2 class="logo" onclick="location.href='index.html'" style="cursor: pointer;">Skill<span>Bridge</span></h2>
        <nav class="navigation">
            <a href="afterlogin/dashboard.html">Dashboard</a>
            <a href="profile.html">Profile</a>
            <a href="assessment.html">Assessments</a>
            <a href="roadmap.html">Roadmap</a>
            <button id="darkModeToggle" class="theme-btn" style="background:none; border:none; color:inherit; cursor:pointer;">
                <i class="fas fa-moon"></i>
            </button>
            <button class="btnLogin-popup" onclick="logout()">Logout</button>
        </nav>
    </header>


    <div class="analysis-card">
        <h1>Skill <span>Gap Analysis</span></h1>
        <p>Compare your current skill levels with the requirements for your target role.</p>
        
        <div style="margin: 30px 0; text-align: center;">
            <label>Select Target Role:</label><br>
            <select id="role-select" onchange="runAnalysis()" style="padding: 12px; width: 100%; max-width: 400px; border-radius: 10px; margin: 10px 0;">
                <option value="" disabled selected>-- Select a Role --</option>
                <option value="Frontend Developer">Frontend Developer</option>
                <option value="Backend Developer">Backend Developer</option>
                <option value="Full Stack Developer">Full Stack Developer</option>
            </select>
        </div>

        <div id="analysis-results" style="display: none;">
            <h3 id="analysis-title" style="margin-bottom: 20px;">Analysis for Role</h3>
            <div id="gaps-list"></div>
            
            <div style="margin-top: 40px; text-align: center;">
                <button onclick="location.href='roadmap.html'" class="btn">Generate Learning Roadmap</button>
            </div>
        </div>

        <div id="no-data-msg" style="display: none; text-align: center; padding: 20px;">
            <p>No assessment data found. Please complete an assessment first.</p>
            <button onclick="location.href='assessment.html'" class="btn">Go to Assessment</button>
        </div>
    </div>

    <script src="roleData.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        let assessmentResults = {};

        async function fetchAssessmentData() {
            try {
                const response = await fetch('/api/profile/me');
                const result = await response.json();
                if (result.success && result.data.assessments) {
                    // Convert array to the object format expected by runAnalysis
                    result.data.assessments.forEach(item => {
                        assessmentResults[item.skill] = { currentLevel: item.level };
                    });
                }
            } catch (error) {
                console.error("Failed to fetch assessment data:", error);
            }
        }

        async function runAnalysis() {
            await fetchAssessmentData();
            const role = document.getElementById('role-select').value;
            const requirements = roleRequirements[role];
            
            const resultsContainer = document.getElementById('analysis-results');
            const gapsList = document.getElementById('gaps-list');
            const noDataMsg = document.getElementById('no-data-msg');

            if (Object.keys(assessmentResults).length === 0) {
                resultsContainer.style.display = 'none';
                noDataMsg.style.display = 'block';
                return;
            }

            noDataMsg.style.display = 'none';
            resultsContainer.style.display = 'block';
            document.getElementById('analysis-title').innerText = `Analysis for ${role}`;
            gapsList.innerHTML = '';

            const levels = ["None", "Beginner", "Intermediate", "Advanced"];

            for (const skill in requirements) {
                const requiredLevel = requirements[skill];
                const userSkillData = assessmentResults[skill] || { currentLevel: "None" };
                const userLevel = userSkillData.currentLevel;

                const reqIdx = levels.indexOf(requiredLevel);
                const userIdx = levels.indexOf(userLevel);

                let statusClass = "";
                let statusText = "";

                if (userIdx >= reqIdx) {
                    statusClass = "status-complete";
                    statusText = "Completed";
                } else if (userIdx === 0) {
                    statusClass = "status-gap";
                    statusText = "Skill Gap";
                } else {
                    statusClass = "status-improvement";
                    statusText = "Needs Improvement";
                }

                const item = document.createElement('div');
                item.className = 'gap-item';
                item.innerHTML = `
                    <div>
                        <strong>${skill}</strong><br>
                        <span class="level-text">Target: ${requiredLevel} | Your Level: ${userLevel}</span>
                    </div>
                    <span class="status-badge ${statusClass}">${statusText}</span>
                `;
                gapsList.appendChild(item);
            }

            // Save the gaps for roadmap generation
            localStorage.setItem('target_role', role);
        }

        // Initial fetch
        fetchAssessmentData();

        // Theme logic
        const toggleBtn = document.getElementById('darkModeToggle');
        const body = document.body;
        const updateThemeUI = (isDark) => {
            body.classList.toggle('dark-mode', isDark);
            if (toggleBtn) toggleBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        };
        const savedTheme = localStorage.getItem('theme');
        updateThemeUI(savedTheme === 'dark');
        if (toggleBtn) toggleBtn.addEventListener('click', () => {
            const isDark = body.classList.contains('dark-mode');
            const newTheme = !isDark;
            localStorage.setItem('theme', newTheme ? 'dark' : 'light');
            updateThemeUI(newTheme);
        });
    </script>
</body>
</html>
