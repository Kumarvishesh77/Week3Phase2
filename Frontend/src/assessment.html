<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Assessment - SkillBridge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .assessment-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(12px);
            max-width: 800px;
            margin: 120px auto 40px auto;
            box-shadow: var(--shadow);
        }
        .timer-box {
            position: sticky;
            top: 100px;
            float: right;
            background: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 10;
        }
        .question-block {
            margin-bottom: 25px;
            text-align: left;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }
        .options-list label {
            display: block;
            margin: 10px 0;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .options-list label:hover {
            background: rgba(255,255,255,0.1);
        }
        .level-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: var(--accent);
            color: white;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .result-screen {
            text-align: center;
        }
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            margin: 20px auto;
        }
        /* Autocomplete Styles */
        .autocomplete-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 10px auto;
        }
        #skill-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--nav-bg);
            border: 1px solid var(--glass-border);
            border-radius: 0 0 10px 10px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            backdrop-filter: blur(15px);
            text-align: left;
        }
        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-main);
        }
        .suggestion-item:hover {
            background: var(--accent);
            color: white;
        }
        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <h2 class="logo" onclick="location.href='index.html'" style="cursor: pointer;">Skill<span>Bridge</span></h2>
        <nav class="navigation">
            <a href="afterlogin/dashboard.html">Dashboard</a>
            <a href="profile.html">Profile</a>
            <a href="gap-analysis.html">Gap Analysis</a>
            <a href="roadmap.html">Roadmap</a>
            <button id="darkModeToggle" class="theme-btn" style="background:none; border:none; color:inherit; cursor:pointer;">
                <i class="fas fa-moon"></i>
            </button>
            <button class="btnLogin-popup" onclick="logout()">Logout</button>
        </nav>
    </header>

    <div class="assessment-card">
        <div id="selection-screen">
            <h1>Skill <span>Assessment</span></h1>
            <p>Select a skill and your current knowledge level to begin.</p>
            
            <div style="margin: 30px 0; text-align: center;">
                <label>Type your Skill:</label><br>
                <div class="autocomplete-container">
                    <input type="text" id="skill-input" placeholder="e.g. Java, M365, Python" autocomplete="off" 
                           style="padding: 12px; width: 100%; border-radius: 10px; border: 1px solid var(--glass-border); background: var(--input-bg); color: var(--text-main);">
                    <div id="skill-suggestions"></div>
                </div>
            </div>

            <div style="margin: 30px 0;">
                <label>Select Initial Level:</label><br>
                <select id="level-select" style="padding: 12px; width: 100%; max-width: 400px; border-radius: 10px; margin: 10px 0; background: var(--input-bg); color: var(--text-main);">
                    <option value="Beginner">Beginner (Basic)</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                </select>
            </div>

            <button onclick="initAssessment()" class="btn" style="width: 100%; max-width: 400px;">Start Assessment</button>
        </div>

        <div id="quiz-screen" style="display: none;">
            <div class="timer-box" id="timer">Time: 20:00</div>
            <div class="level-badge" id="current-level-display">Level</div>
            <h2 id="quiz-title">Skill Assessment</h2>
            <hr style="margin: 20px 0; opacity: 0.2;">
            
            <div id="questions-container"></div>
        </div>

        <div id="result-screen" class="result-screen" style="display: none;">
            <h2 id="result-title">Assessment Result</h2>
            <div class="score-circle" id="score-display">0%</div>
            <p id="result-message"></p>
            
            <div id="result-actions" style="margin-top: 30px; display: flex; gap: 20px; justify-content: center;">
                <!-- Buttons will be injected here -->
            </div>
        </div>
    </div>

    <script src="skillRepository.js"></script>
    <script src="quizData.js"></script>
    <script src="assessment.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        const toggleBtn = document.getElementById('darkModeToggle');
        const body = document.body;
        const updateThemeUI = (isDark) => {
            body.classList.toggle('dark-mode', isDark);
            if (toggleBtn) toggleBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        };
        const savedTheme = localStorage.getItem('theme');
        updateThemeUI(savedTheme === 'dark');
        if (toggleBtn) toggleBtn.addEventListener('click', () => {
            const isDark = body.classList.contains('dark-mode');
            const newTheme = !isDark;
            localStorage.setItem('theme', newTheme ? 'dark' : 'light');
            updateThemeUI(newTheme);
        });
    </script>
</body>
</html>
